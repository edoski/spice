vars:
  - params.yaml

stages:
  acquire:
    cmd: .venv/bin/spice-dvc acquire
    deps:
      - pyproject.toml
      - src/spice
    params:
      - params.yaml:
    outs:
      - ${paths.history_dir}
      - ${paths.evaluation_dir}
      - ${paths.metadata_root}

  tune:
    cmd: .venv/bin/spice-dvc tune
    deps:
      - pyproject.toml
      - src/spice
      - ${paths.history_dir}
    params:
      - params.yaml:
    outs:
      - ${paths.tuning_root}/study.json
      - ${paths.tuning_root}/trials.json
      - ${paths.tuning_best_params_path}
      - ${paths.tuning_root}/trials

  train:
    cmd: .venv/bin/spice-dvc train
    deps:
      - pyproject.toml
      - src/spice
      - ${paths.history_dir}
      - ${paths.tuning_best_params_path}
    params:
      - params.yaml:
    outs:
      - ${paths.artifact_root}/artifact.json
      - ${paths.artifact_root}/model.pt
      - ${paths.train_report_path}

  simulate:
    cmd: .venv/bin/spice-dvc simulate
    deps:
      - pyproject.toml
      - src/spice
      - ${paths.artifact_root}/artifact.json
      - ${paths.artifact_root}/model.pt
      - ${paths.history_dir}
      - ${paths.evaluation_dir}
    params:
      - params.yaml:
    outs:
      - ${paths.simulation_report_path}
