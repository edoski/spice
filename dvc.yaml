vars:
  - params.yaml

stages:
  acquire:
    cmd: >-
      .venv/bin/spice-acquire
      chain=${run.chain}
      provider=${run.provider}
      runtime.output_root=${run.output_root}
      max_delay_seconds=${run.max_delay_seconds}
      lookback_seconds=${run.lookback_seconds}
      target_anchor_count=${run.target_anchor_count}
    deps:
      - pyproject.toml
      - src/spice
    params:
      - params.yaml:
          - run.chain
          - run.provider
          - run.output_root
          - run.max_delay_seconds
          - run.lookback_seconds
          - run.target_anchor_count
      - src/spice/conf/acquire.yaml
      - src/spice/conf/chain/${run.chain}.yaml
      - src/spice/conf/provider/${run.provider}.yaml
      - src/spice/conf/runtime/local.yaml
    outs:
      - ${run.output_root}/datasets/${run.chain}/raw
      - ${run.output_root}/datasets/${run.chain}/enriched
      - ${run.output_root}/validation/${run.chain}

  train:
    cmd: >-
      .venv/bin/spice-train
      chain=${run.chain}
      model=${run.model}
      provider=${run.provider}
      runtime.output_root=${run.output_root}
      max_delay_seconds=${run.max_delay_seconds}
      lookback_seconds=${run.lookback_seconds}
      target_anchor_count=${run.target_anchor_count}
      training.device=${training.device}
      training.max_epochs=${training.max_epochs}
      training.effective_batch_size=${training.effective_batch_size}
      training.early_stopping_patience=${training.early_stopping_patience}
    deps:
      - pyproject.toml
      - src/spice
      - ${run.output_root}/datasets/${run.chain}/enriched/history
    params:
      - params.yaml:
          - run.chain
          - run.model
          - run.provider
          - run.output_root
          - run.max_delay_seconds
          - run.lookback_seconds
          - run.target_anchor_count
          - training.device
          - training.max_epochs
          - training.effective_batch_size
          - training.early_stopping_patience
      - src/spice/conf/train.yaml
      - src/spice/conf/chain/${run.chain}.yaml
      - src/spice/conf/model/${run.model}.yaml
      - src/spice/conf/provider/${run.provider}.yaml
      - src/spice/conf/training/default.yaml
      - src/spice/conf/runtime/local.yaml
    outs:
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s

  simulate:
    cmd: >-
      .venv/bin/spice-simulate
      chain=${run.chain}
      model=${run.model}
      provider=${run.provider}
      runtime.output_root=${run.output_root}
      max_delay_seconds=${run.max_delay_seconds}
      lookback_seconds=${run.lookback_seconds}
      target_anchor_count=${run.target_anchor_count}
      training.device=${training.device}
      training.effective_batch_size=${training.effective_batch_size}
      simulation.window_seconds=${simulation.window_seconds}
      simulation.arrival_rate_per_second=${simulation.arrival_rate_per_second}
      simulation.repetitions=${simulation.repetitions}
    deps:
      - pyproject.toml
      - src/spice
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s
      - ${run.output_root}/datasets/${run.chain}/enriched/history
      - ${run.output_root}/datasets/${run.chain}/enriched/evaluation
    params:
      - params.yaml:
          - run.chain
          - run.model
          - run.provider
          - run.output_root
          - run.max_delay_seconds
          - run.lookback_seconds
          - run.target_anchor_count
          - training.device
          - training.effective_batch_size
          - simulation.window_seconds
          - simulation.arrival_rate_per_second
          - simulation.repetitions
      - src/spice/conf/simulate.yaml
      - src/spice/conf/chain/${run.chain}.yaml
      - src/spice/conf/model/${run.model}.yaml
      - src/spice/conf/provider/${run.provider}.yaml
      - src/spice/conf/simulation/default.yaml
      - src/spice/conf/runtime/local.yaml
    outs:
      - ${run.output_root}/simulations/${run.chain}/${run.model}/${run.max_delay_seconds}s

  tune:
    cmd: >-
      .venv/bin/spice-tune
      chain=${run.chain}
      model=${run.model}
      provider=${run.provider}
      runtime.output_root=${run.output_root}
      max_delay_seconds=${run.max_delay_seconds}
      lookback_seconds=${run.lookback_seconds}
      target_anchor_count=${run.target_anchor_count}
      training.device=${training.device}
      training.max_epochs=${training.max_epochs}
      training.effective_batch_size=${training.effective_batch_size}
      tuning.n_trials=${tuning.n_trials}
      tuning.prune=${tuning.prune}
    deps:
      - pyproject.toml
      - src/spice
      - ${run.output_root}/datasets/${run.chain}/enriched/history
    params:
      - params.yaml:
          - run.chain
          - run.model
          - run.provider
          - run.output_root
          - run.max_delay_seconds
          - run.lookback_seconds
          - run.target_anchor_count
          - training.device
          - training.max_epochs
          - training.effective_batch_size
          - tuning.n_trials
          - tuning.prune
      - src/spice/conf/tune.yaml
      - src/spice/conf/chain/${run.chain}.yaml
      - src/spice/conf/model/${run.model}.yaml
      - src/spice/conf/provider/${run.provider}.yaml
      - src/spice/conf/tuning/default.yaml
      - src/spice/conf/runtime/local.yaml
    outs:
      - ${run.output_root}/tuning/${run.chain}/${run.model}/${run.max_delay_seconds}s
