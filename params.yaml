chain: ethereum
model: lstm
provider: publicnode

runtime:
  output_root: artifacts

dataset:
  id: icdcs_2025_11_09
  window:
    start_date: "2025-11-09"
    end_date: "2025-11-09"
  temporal:
    max_delay_seconds: 36
    lookback_seconds: 600
  sampling:
    anchor_count: 400000
    history_anchor_count: null

acquisition:
  requests_per_second: 25
  max_concurrent_requests: 2
  max_concurrent_chunks: 1
  chunk_size: 1000
  overwrite: false
  enrich_batch_size: 100
  max_methods_per_second: 20.0

training:
  device: auto
  max_epochs: 50
  batch_size: 64
  early_stopping:
    patience: 8

simulation:
  window_seconds: 7200
  arrival_rate_per_second: 0.05
  repetitions: 50

tuning:
  trial_count: 20
  enable_pruning: true
