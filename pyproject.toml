[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "spice-temporal-baseline"
version = "0.1.0"
description = "Practical reproduction of the SPICE temporal module baseline."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Edoardo" }
]
dependencies = [
  "numpy>=1.26",
  "polars>=1.5",
  "pyarrow>=17.0",
  "PyYAML>=6.0",
  "typer>=0.12",
  "torch>=2.5",
  "optuna>=4.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "ruff>=0.6",
]

[project.scripts]
spice-temporal = "spice_temporal.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/spice_temporal"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
