defaults:
  - chain: ethereum
  - dataset: default
  - evaluation: default
  - model: lstm
  - provider: publicnode
  - acquisition: default
  - optional rpc_profile: ${provider}/${chain}
  - split: default
  - training: default
  - simulation: default
  - tracking: mlflow
  - tuning: default
  - runtime: local
  - paths: default
  - _self_

task: train

hydra:
  job:
    chdir: false
  run:
    dir: ${runtime.hydra_run_dir}
  sweep:
    dir: ${runtime.hydra_sweep_dir}
