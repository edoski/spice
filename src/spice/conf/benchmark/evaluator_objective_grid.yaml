cases:
  - id: evaluator_objective_grid
    base:
      surface: current_row_fee_dynamics
      training: default
      split: default
      study: evaluator_objective_grid
    dimensions:
      data:
        - set: {chain: ethereum, dataset_id: cor_9a73b1e88edb488afb1e}
        - set: {chain: polygon, dataset_id: cor_415186063685f5b7588f}
        - set: {chain: avalanche, dataset_id: cor_91fa9b80b6014317c148}
      models:
        - set:
            model: lstm
            tuning_space: lstm_large_capacity
        - set:
            model: transformer
            tuning_space: transformer_large_capacity
        - set:
            model: transformer_lstm
            tuning_space: transformer_lstm_large_capacity
      problems:
        - ref: current_row_nominal
    steps:
      - id: train_poisson_objective
        workflow: train
        set:
          objective: profit_poisson_replay_2h
          evaluation: poisson_replay_2h
          variant: baseline
      - id: train_full_objective
        workflow: train
        set:
          objective: profit_full_temporal_replay
          evaluation: full_temporal_replay
          variant: baseline
      - id: evaluate_poisson_artifact_with_poisson
        workflow: evaluate
        after: [train_poisson_objective]
        artifact_from: train_poisson_objective
        set:
          evaluation: poisson_replay_2h
      - id: evaluate_poisson_artifact_with_full
        workflow: evaluate
        after: [train_poisson_objective]
        artifact_from: train_poisson_objective
        set:
          evaluation: full_temporal_replay
      - id: evaluate_full_artifact_with_poisson
        workflow: evaluate
        after: [train_full_objective]
        artifact_from: train_full_objective
        set:
          evaluation: poisson_replay_2h
      - id: evaluate_full_artifact_with_full
        workflow: evaluate
        after: [train_full_objective]
        artifact_from: train_full_objective
        set:
          evaluation: full_temporal_replay
