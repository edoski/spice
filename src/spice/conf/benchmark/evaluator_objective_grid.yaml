cases:
  - id: evaluator_objective_grid
    base:
      surface: current_row_fee_dynamics
      training: default
      split: default
      study: evaluator_objective_grid
      evaluation_window:
        start: "2026-02-03T14:00:00Z"
        duration_seconds: 7200
    dimensions:
      data:
        - set: {chain: ethereum, corpus_id: cor_9a73b1e88edb488afb1e}
        - set: {chain: polygon, corpus_id: cor_415186063685f5b7588f}
        - set: {chain: avalanche, corpus_id: cor_91fa9b80b6014317c148}
      models:
        - set:
            model: lstm
            tuning_space: lstm_large_capacity
        - set:
            model: transformer
            tuning_space: transformer_large_capacity
        - set:
            model: transformer_lstm
            tuning_space: transformer_lstm_large_capacity
      problems:
        - ref: current_row_nominal
    steps:
      - id: train_poisson_objective
        workflow: train
        set:
          objective: profit_poisson_replay
          evaluator: poisson_replay
          variant: baseline
      - id: evaluate_poisson_artifact_with_poisson
        workflow: evaluate
        after: [train_poisson_objective]
        artifact_from: train_poisson_objective
        set:
          evaluator: poisson_replay
