cases:
  - id: large_capacity_hpo
    base:
      surface: current_row_fee_dynamics
      training: default
      split: default
      tuning: extensive
      study: large_capacity_hpo
    dimensions:
      data:
        - set: {chain: ethereum}
        - set: {chain: polygon}
        - set: {chain: avalanche}
      models:
        - set:
            model: lstm
            tuning_space: lstm_large_capacity
        - set:
            model: transformer
            tuning_space: transformer_large_capacity
        - set:
            model: transformer_lstm
            tuning_space: transformer_lstm_large_capacity
      problems:
        - ref: current_row_nominal
    steps:
      - id: tune
        workflow: tune
        set:
          objective: profit_poisson_replay_2h
          evaluation: poisson_replay_2h
          trial_count: 40
      - id: train_tuned
        workflow: train
        after: [tune]
        set:
          objective: profit_poisson_replay_2h
          evaluation: poisson_replay_2h
          variant: tuned
      - id: evaluate_tuned
        workflow: evaluate
        after: [train_tuned]
        set:
          objective: profit_poisson_replay_2h
          evaluation: poisson_replay_2h
          variant: tuned
