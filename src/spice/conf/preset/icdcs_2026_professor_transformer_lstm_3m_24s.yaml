chain: ethereum
dataset: icdcs_2026_3m
provider: publicnode
problem: icdcs_2026_professor_3m_24s
dataset_builder: professor_temporal
feature_set: icdcs_2026_professor
prediction: icdcs_2026
objective: paper_profit_replay_2h
evaluation: paper_replay_2h
model: transformer_lstm
tuning_space: transformer_lstm_default
acquisition:
  dry_run: false
  chunk_size: 8192
  rpc:
    batch_size: 256
    concurrency: 48
    min_batch_size: 64
    concurrency_rungs: [8, 16, 24, 32, 48]
training:
  learning_rate: 0.0003
  weight_decay: 0.0001
  batch_size: 64
  max_epochs: 50
  early_stopping:
    patience: 8
    min_delta: 0.0001
  gradient_clip_norm: 1.0
  seed: 2026
  deterministic: true
  log_every_n_steps: 10
  input_normalization:
    id: row_standard
split:
  train_fraction: 0.8
  validation_fraction: 0.1
delay_seconds: 24
tuning:
  trial_count: 20
  timeout_seconds: null
  sampler_seed: 2026
  enable_pruning: true
