name: publicnode
transport:
  timeout_seconds: 30.0
  retry_count: 5
  backoff_factor: 0.125
acquisition:
  dry_run: false
  chunk_size: 32768
  rpc:
    batch_size: 32
    concurrency: 64
    min_batch_size: 1
    concurrency_rungs:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 48
    - 64
endpoints:
  ethereum:
    url: https://ethereum-rpc.publicnode.com
  polygon:
    url: https://polygon-bor-rpc.publicnode.com
  avalanche:
    url: https://avalanche-c-chain-rpc.publicnode.com
