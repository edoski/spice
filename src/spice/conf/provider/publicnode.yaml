name: publicnode
transport:
  timeout_seconds: 30.0
  retry_count: 5
  backoff_factor: 0.125
acquisition:
  dry_run: false
  chunk_size: 4096
  rpc:
    batch_size: 4
    concurrency: 2
    min_batch_size: 1
    concurrency_rungs:
    - 1
    - 2
endpoints:
  ethereum:
    url: https://ethereum-rpc.publicnode.com
  polygon:
    url: https://polygon-bor-rpc.publicnode.com
  avalanche:
    url: https://avalanche-c-chain-rpc.publicnode.com
